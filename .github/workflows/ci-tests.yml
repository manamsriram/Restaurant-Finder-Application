name: CI Tests

on:
  pull_request:
  push:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: project_202/routes/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project_202/routes/requirements.txt

      - name: Run unit and integration tests
        working-directory: project_202
        env:
          DATABASE_URL: sqlite:///./ci.db
          DB_USERNAME: ci_user
          DB_PASSWORD: ci_pass
          DB_HOST: localhost
          DB_PORT: "3306"
          DB_NAME: ci_db
          SECRET_KEY: ci-secret-key-1234567890
          MAPS_KEY: ci-maps-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        run: pytest tests
